<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0a16"/>
      <stop offset="55%" stop-color="#14112a"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotgrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#2a2550"/>
    </pattern>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#dotgrid)" opacity="0.6"/>

  <!-- circuit traces -->
  <g fill="none" stroke="#2e2a55" stroke-width="2">
    <path d="M0 40 H180 L210 70 H430" />
    <path d="M0 180 H140 L170 150 H360 L390 180 H700" />
    <path d="M1200 30 H980 L950 60 H760" />
    <path d="M1200 110 H1000 L970 140 H820 L790 170 H520" />
    <path d="M60 0 V40" />
    <path d="M1140 0 V30" />
    <path d="M900 220 V170" />
  </g>

  <!-- pad nodes -->
  <g fill="#3a3568">
    <circle cx="180" cy="40" r="4"/>
    <circle cx="430" cy="70" r="4"/>
    <circle cx="360" cy="150" r="4"/>
    <circle cx="700" cy="180" r="4"/>
    <circle cx="980" cy="30" r="4"/>
    <circle cx="760" cy="60" r="4"/>
    <circle cx="820" cy="140" r="4"/>
    <circle cx="520" cy="170" r="4"/>
  </g>

  <!-- animated signal pulses travelling along traces -->
  <circle r="4" fill="#22d3ee" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite"
      path="M0 40 H180 L210 70 H430" />
    <animate attributeName="opacity" values="0;1;1;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#f472b6" filter="url(#glow)">
    <animateMotion dur="4s" begin="0.4s" repeatCount="indefinite"
      path="M0 180 H140 L170 150 H360 L390 180 H700" />
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#34d399" filter="url(#glow)">
    <animateMotion dur="2.8s" begin="0.9s" repeatCount="indefinite"
      path="M1200 30 H980 L950 60 H760" />
    <animate attributeName="opacity" values="0;1;1;0" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="3.6s" begin="1.3s" repeatCount="indefinite"
      path="M1200 110 H1000 L970 140 H820 L790 170 H520" />
    <animate attributeName="opacity" values="0;1;1;0" dur="3.6s" begin="1.3s" repeatCount="indefinite"/>
  </circle>

  <!-- scanline sweep -->
  <rect x="-200" y="0" width="200" height="220" fill="#ffffff" opacity="0.03">
    <animate attributeName="x" values="-200;1200" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- title -->
  <text x="600" y="100" text-anchor="middle" font-family="Consolas, 'Courier New', monospace"
        font-size="13" letter-spacing="6" fill="#7a76a8">// MODULE 205/6 · DLD</text>

  <text x="600" y="140" text-anchor="middle" font-family="Verdana, Geneva, sans-serif"
        font-size="42" font-weight="700" letter-spacing="2" fill="url(#titleGrad)" filter="url(#glow)">
    DIGITAL LOGIC DESIGN
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="168" text-anchor="middle" font-family="Consolas, 'Courier New', monospace"
        font-size="13" letter-spacing="2" fill="#8f8bbd">
    Virtual Breadboard &#183; Boolean Algebra &#183; K-Maps &#183; IC Reference
  </text>

  <!-- blinking cursor -->
  <rect x="905" y="176" width="9" height="14" fill="#22d3ee">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
